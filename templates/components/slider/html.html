<!-- Cake Design System — Slider -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Cake Slider</title>
<style>
.cake-slider { position: relative; padding: var(--fdn-spacing-space-8) 0; width: 280px; }
.cake-slider__track { position: relative; width: 100%; height: 6px; border-radius: var(--fdn-radius-radius-4); background: var(--sem-color-bg-secondary); }
.cake-slider__range { position: absolute; left: 0; top: 0; height: 100%; width: 60%; border-radius: var(--fdn-radius-radius-4); background: var(--sem-color-interactive-primary); }
.cake-slider__thumb {
  position: absolute; top: 50%; left: 60%; transform: translate(-50%, -50%);
  width: 18px; height: 18px; border-radius: 50%; background: var(--sem-color-bg-primary);
  border: 2px solid var(--sem-color-interactive-primary); box-shadow: var(--fdn-shadow-shadow-3); cursor: pointer;
}
</style></head>
<body>
  <div class="cake-slider">
    <div class="cake-slider__track">
      <div class="cake-slider__range"></div>
      <div class="cake-slider__thumb"></div>
    </div>
  </div>
</body></html>
